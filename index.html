<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>車両管理アプリ（読み込み機能付）</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #e0e0e0; padding: 20px; }
  .card { background: #2a2a2a; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { border: 1px solid #444; padding: 10px; }
  button { padding: 8px 12px; cursor: pointer; background: #0078d4; color: #fff; border: none; border-radius: 4px; }
  .status { color: #9cdcfe; margin-top: 10px; }
</style>
</head>
<body>

<div class="card">
  <h2>Googleドライブ連携</h2>
  <button id="loginBtn">Googleログイン</button>
  <button id="loadBtn">データを読み込む</button>
  <p id="statusMsg" class="status"></p>
</div>

<div class="card">
  <h2>車両一覧</h2>
  <table id="carTable">
    <thead><tr><th>ナンバー</th><th>車種</th><th>操作</th></tr></thead>
    <tbody></tbody>
  </table>
  <button onclick="saveVehicleData()">上書き保存</button>
</div>

<script>
  let appData = { cars: [] };
  let accessToken = null;

  // ログイン初期化
  const tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: '1074075293181-lg9bbbgk3h3shb1fdnjspt860i276957.apps.googleusercontent.com',
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: (res) => { accessToken = res.access_token; document.getElementById("statusMsg").textContent = "ログイン完了"; }
  });

  document.getElementById("loginBtn").onclick = () => tokenClient.requestAccessToken();

  // 【追加】データ読み込み機能
  document.getElementById("loadBtn").onclick = async () => {
    if (!accessToken) { alert("ログインしてください"); return; }
    
    // 1. ファイルを検索 (名前で検索)
    const query = encodeURIComponent("name = 'vehicle_data.json' and trashed = false");
    const listRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${query}`, {
      headers: { Authorization: "Bearer " + accessToken }
    });
    const list = await listRes.json();
    
    if (list.files && list.files.length > 0) {
      const fileId = list.files[0].id;
      // 2. ファイルをダウンロード
      const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
        headers: { Authorization: "Bearer " + accessToken }
      });
      appData = await fileRes.json();
      renderCarTable();
      document.getElementById("statusMsg").textContent = "データを読み込みました！";
    } else {
      alert("保存されたファイルが見つかりませんでした。");
    }
  };

  function renderCarTable() {
    const tbody = document.querySelector("#carTable tbody");
    tbody.innerHTML = "";
    appData.cars.forEach(car => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${car.number}</td><td>${car.model}</td><td><button onclick="deleteCar(${car.id})">削除</button></td>`;
      tbody.appendChild(tr);
    });
  }

  // 保存機能（既存と同じ）
  async function saveVehicleData() {
    // ...以前の保存ロジックと同じ...
    alert("保存しました！");
  }

  function deleteCar(id) {
    appData.cars = appData.cars.filter(c => c.id !== id);
    renderCarTable();
  }
</script>
</body>
</html>
