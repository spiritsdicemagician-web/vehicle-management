<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>車両管理アプリ - 安定版</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #fff; padding: 20px; }
        .card { background: #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #555; padding: 8px; }
        button { padding: 10px; cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2>状態: <span id="statusMsg">初期化中...</span></h2>
    <button id="loginBtn">1. Googleログイン</button>
    <button id="loadBtn">2. データ読み込み</button>
</div>

<div class="card">
    <h2>車両一覧</h2>
    <table id="carTable">
        <thead><tr><th>ナンバー</th><th>車種</th><th>操作</th></tr></thead>
        <tbody></tbody>
    </table>
    <button onclick="saveVehicleData()">3. 上書き保存</button>
</div>

<script>
    let appData = { cars: [] };
    let accessToken = null;
    let tokenClient;

    // 初期化を確実に実行
    window.onload = () => {
        try {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: '1074075293181-lg9bbbgk3h3shb1fdnjspt860i276957.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/drive.file',
                callback: (res) => {
                    accessToken = res.access_token;
                    document.getElementById("statusMsg").innerText = "ログイン完了";
                }
            });
            document.getElementById("statusMsg").innerText = "準備完了";
        } catch (e) {
            document.getElementById("statusMsg").innerText = "エラー: " + e.message;
        }
    };

    document.getElementById("loginBtn").onclick = () => {
        if (!tokenClient) { alert("Googleの読み込み待ちです"); return; }
        tokenClient.requestAccessToken();
    };

    document.getElementById("loadBtn").onclick = async () => {
        if (!accessToken) { alert("先にログインしてください"); return; }
        try {
            document.getElementById("statusMsg").innerText = "検索中...";
            const res = await fetch("https://www.googleapis.com/drive/v3/files?q=name='vehicle_data.json' and trashed=false", {
                headers: { Authorization: "Bearer " + accessToken }
            });
            const list = await res.json();
            
            if (!list.files || list.files.length === 0) {
                document.getElementById("statusMsg").innerText = "ファイルが見つかりません";
                return;
            }

            const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${list.files[0].id}?alt=media`, {
                headers: { Authorization: "Bearer " + accessToken }
            });
            appData = await fileRes.json();
            
            // テーブル表示
            const tbody = document.querySelector("#carTable tbody");
            tbody.innerHTML = "";
            appData.cars.forEach(car => {
                tbody.innerHTML += `<tr><td>${car.number}</td><td>${car.model}</td><td><button onclick="deleteCar(${car.id})">削除</button></td></tr>`;
            });
            document.getElementById("statusMsg").innerText = "読み込み完了";
        } catch (e) {
            document.getElementById("statusMsg").innerText = "エラー: " + e.message;
        }
    };
    
    // 保存関数などは省略可能ですが、まずはこの「読み込み」が動くか確認させてください
</script>
</body>
</html>
