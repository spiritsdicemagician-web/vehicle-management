<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CAR MANAGER</title>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #0a0e14; color: #e0e0e0; padding: 20px; }
  .card { background: #151b23; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
  button { padding: 10px 20px; cursor: pointer; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-weight: 600; }
  button:disabled { background: #555; cursor: not-allowed; }
</style>
</head>
<body>

<div class="card">
  <h2>状態: <span id="statusMsg">Googleライブラリ読み込み中...</span></h2>
  <!-- 最初はボタンを無効化（disabled）しておく -->
  <button id="loginBtn" disabled>1. Googleログイン</button>
  <button id="loadBtn" disabled>2. データ読み込み</button>
</div>

<script>
  let accessToken = null;
  let tokenClient;

  // ライブラリの読み込みが終わるのを待ってから初期化
  window.onload = () => {
    try {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: '1074075293181-lg9bbbgk3h3shb1fdnjspt860i276957.apps.googleusercontent.com',
        scope: 'https://www.googleapis.com/auth/drive.file',
        callback: (res) => {
          accessToken = res.access_token;
          document.getElementById("statusMsg").innerText = "ログイン成功！";
        }
      });
      // 準備完了！ボタンを有効にする
      document.getElementById("loginBtn").disabled = false;
      document.getElementById("loadBtn").disabled = false;
      document.getElementById("statusMsg").innerText = "準備完了";
    } catch (e) {
      document.getElementById("statusMsg").innerText = "初期化エラー: " + e.message;
    }
  };

  document.getElementById("loginBtn").onclick = () => {
    if (tokenClient) tokenClient.requestAccessToken();
  };
</script>
</body>
</html>
