<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CAR MANAGER</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; }
  .container { max-width: 1100px; margin: auto; padding: 24px; }
  .logo { font-size: 32px; font-weight: bold; color: #58a6ff; text-align: center; margin-bottom: 20px; }
  .header-info { text-align: right; color: #8b949e; margin-bottom: 10px; }
  .card { background: #161b22; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.4); }
  .card h2 { margin-top: 0; color: #58a6ff; }
  .stats { display: flex; gap: 20px; }
  .stat-box { flex: 1; background: #21262d; padding: 20px; border-radius: 10px; text-align: center; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td { border-bottom: 1px solid #30363d; padding: 10px; }
  th { background: #21262d; }
  input, button { padding: 10px; margin-top: 6px; border-radius: 6px; border: none; }
  input { background: #21262d; color: #fff; width: 260px; }
  button { background: #238636; color: #fff; cursor: pointer; font-weight: 600; margin-right: 5px; }
  .edit-btn { background: #0078d4; }
  .delete-btn { background: #d9534f; }
  .detail-btn { background: #8250df; }
  /* モーダル */
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
  .modal-content { background: #161b22; margin: 10% auto; padding: 20px; width: 50%; border-radius: 10px; }
</style>
</head>
<body>

<div class="container">
  <div class="logo">CAR MANAGER</div>
  <div class="header-info" id="currentDateTime"></div>

  <div class="card">
    <h2>ダッシュボード</h2>
    <div class="stats">
      <div class="stat-box"><h3>🚗 登録車両数</h3><p id="statTotal">0台</p></div>
      <div class="stat-box"><h3>今月の点検予定</h3><p id="statUpcoming">0台</p></div>
    </div>
  </div>

  <div class="card">
    <h2>車両一覧</h2>
    <table id="carTable">
      <thead>
        <tr><th>ナンバー</th><th>車種</th><th>メーカー</th><th>使用者</th><th>車検日</th><th>点検日</th><th>備考</th><th>詳細</th><th>編集</th><th>削除</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card">
    <h2>車両登録</h2>
    <input type="text" id="carNumber" placeholder="ナンバー">
    <input type="text" id="model" placeholder="車種">
    <input type="date" id="inspection"> <!-- 直近の点検日 -->
    <input type="date" id="shaken"> <!-- 車検日 -->
    <button id="addCar">登録する</button>
  </div>
</div>

<!-- 詳細履歴用モーダル -->
<div id="detailModal" class="modal">
  <div class="modal-content">
    <h2>整備履歴</h2>
    <div id="historyList"></div>
    <button onclick="document.getElementById('detailModal').style.display='none'">閉じる</button>
  </div>
</div>

<script>
  let appData = { cars: [] };
  
  // 日時更新
  function updateDateTime() {
    document.getElementById("currentDateTime").textContent = new Date().toLocaleString('ja-JP');
  }
  setInterval(updateDateTime, 1000);
  updateDateTime();

  // 履歴表示用
  function showDetails(id) {
    const car = appData.cars.find(c => c.id === id);
    const list = document.getElementById("historyList");
    list.innerHTML = `<p>車両: ${car.number}</p><p>最終点検日: ${car.inspection}</p><h4>過去の検査内容</h4><p>データなし</p>`;
    document.getElementById("detailModal").style.display = 'block';
  }

  // 車両登録（追加ロジックは既存のものを拡張）
  document.getElementById("addCar").onclick = () => {
    appData.cars.push({
      id: Date.now(),
      number: document.getElementById("carNumber").value,
      model: document.getElementById("model").value,
      inspection: document.getElementById("inspection").value,
      shaken: document.getElementById("shaken").value,
      history: []
    });
    renderCarTable();
  };

  function renderCarTable() {
    const tbody = document.querySelector("#carTable tbody");
    tbody.innerHTML = "";
    appData.cars.forEach(car => {
      tbody.innerHTML += `<tr>
        <td>${car.number}</td><td>${car.model}</td><td>-</td><td>-</td>
        <td>${car.shaken}</td><td>${car.inspection}</td><td>-</td>
        <td><button class="detail-btn" onclick="showDetails(${car.id})">詳細</button></td>
        <td><button class="edit-btn">編集</button></td>
        <td><button class="delete-btn" onclick="deleteCar(${car.id})">削除</button></td>
      </tr>`;
    });
  }

  function deleteCar(id) {
    appData.cars = appData.cars.filter(c => c.id !== id);
    renderCarTable();
  }
</script>
</body>
</html>
