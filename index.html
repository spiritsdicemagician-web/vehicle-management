<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CAR MANAGER</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root { --bg: #0a0e14; --card: #151b23; --primary: #3b82f6; --text: #e2e8f0; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; }
  
  /* サイドバー */
  aside { width: 240px; background: var(--card); height: 100vh; padding: 20px; box-sizing: border-box; border-right: 1px solid #333; }
  
  /* メインエリア */
  main { flex: 1; padding: 30px; }
  
  /* カード・コンポーネント */
  .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
  
  table { width: 100%; border-collapse: collapse; margin-top: 15px; }
  th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
  
  /* ボタン・入力 */
  button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
  input { background: #1a222e; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; }
  
  .delete-btn { background: #ef4444; }
</style>
</head>
<body>

<aside>
  <h2>CAR MANAGER</h2>
  <nav><div>ダッシュボード</div><div>車両一覧</div><div>車両登録</div></nav>
</aside>

<main>
  <div class="grid">
    <div class="card">登録車両数<br><h3>3 台</h3></div>
    <div class="card">今月の点検予定<br><h3>1 台</h3></div>
    <div class="card">点検期限超過<br><h3>0 台</h3></div>
    <div class="card">Google Drive<br>同期中</div>
  </div>

  <div class="card">
    <h2>Googleドライブ連携</h2>
    <button id="loginBtn">Googleでログイン</button>
    <button id="loadBtn">データを読み込む</button>
    <p id="statusMsg"></p>
  </div>

  <div class="card">
    <h2>車両一覧</h2>
    <table id="carTable">
      <thead><tr><th>ナンバー</th><th>車種</th><th>メーカー</th><th>使用者</th><th>点検日</th><th>操作</th></tr></thead>
      <tbody></tbody>
    </table>
    <button onclick="saveVehicleData()">上書き保存</button>
  </div>

  <div class="card">
    <h2>車両登録</h2>
    <input type="text" id="carNumber" placeholder="ナンバー">
    <input type="text" id="model" placeholder="車種">
    <input type="text" id="maker" placeholder="メーカー">
    <input type="text" id="user" placeholder="使用者">
    <input type="date" id="inspection">
    <button id="addCar">登録する</button>
  </div>
</main>

<script>
  // ここに既存のJavaScriptロジックをそのままコピー＆ペーストしてね！
  // (ログイン、読み込み、保存、登録の関数)
</script>
</body>
</html>
