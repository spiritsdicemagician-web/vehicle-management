<!-- script タグから async defer を削除 -->
<script src="https://accounts.google.com/gsi/client"></script>

<script>
  let isGoogleReady = false;
  let accessToken = null;
  let tokenClient;

  // ライブラリの読み込み完了を待機
  window.onload = () => {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: '1074075293181-lg9bbbgk3h3shb1fdnjspt860i276957.apps.googleusercontent.com',
      scope: 'https://www.googleapis.com/auth/drive.file',
      callback: (res) => { 
        accessToken = res.access_token; 
        document.getElementById("statusMsg").textContent = "ログイン成功"; 
      }
    });
    isGoogleReady = true;
    console.log("ログイン準備完了");
  };

  document.getElementById("loginBtn").onclick = () => {
    if (!isGoogleReady) {
      alert("まだ準備中です。少し待ってから押してください。");
      return;
    }
    tokenClient.requestAccessToken();
  };
  
  // ...以下、既存の関数...
</script>
