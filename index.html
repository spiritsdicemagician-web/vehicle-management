<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>車両管理アプリ + Googleドライブ保存</title>
<!-- Google Identity Services を読み込み -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #1e1e1e; color: #e0e0e0; }
  .container { padding: 24px; max-width: 1100px; margin: auto; }
  .card { background: #2a2a2a; padding: 20px; border-radius: 10px; margin-top: 20px; }
  button { background: #0078d4; color: #fff; cursor: pointer; padding: 8px 16px; border: none; border-radius: 6px; }
  .status { margin-top: 6px; color: #9cdcfe; }
</style>
</head>
<body>

<div class="container">
  <h1>車両管理アプリ + Googleドライブ保存</h1>

  <div class="card">
    <h2>Googleドライブ連携</h2>
    <!-- 新しいログインボタン -->
    <div id="g_id_onload"
         data-client_id="1074075293181-lg9bbbgk3h3shb1fdnjspt860i276957.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <button id="loginBtn">Googleログイン</button>
    <p id="loginStatus" class="status"></p>
  </div>
  
  <!-- 以下、車両一覧や登録のフォームはそのまま -->
  <!-- ... (省略) ... -->
</div>

<script>
  let tokenClient;
  let accessToken = null;

  // 1. Google Identity Services 初期化
  window.onload = function () {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: '1074075293181-lg9bbbgk3h3shb1fdnjspt860i276957.apps.googleusercontent.com',
      scope: 'https://www.googleapis.com/auth/drive.file',
      callback: (response) => {
        accessToken = response.access_token;
        document.getElementById("loginStatus").textContent = "ログイン成功！";
      },
    });
    
    document.getElementById("loginBtn").onclick = () => {
      tokenClient.requestAccessToken();
    };
  };

  // 2. 保存機能の書き換え (gapi.auth.getToken() を使わず、取得した accessToken を使用)
  async function saveVehicleData() {
    if (!accessToken) { alert("先にログインしてください"); return; }
    
    const jsonData = JSON.stringify(appData);
    const file = new Blob([jsonData], { type: "application/json" });
    const metadata = { name: "vehicle_data.json", mimeType: "application/json" };

    const form = new FormData();
    form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
    form.append("file", file);

    const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
      method: "POST",
      headers: { Authorization: "Bearer " + accessToken },
      body: form
    });
    
    const result = await res.json();
    document.getElementById("saveStatus").textContent = "保存完了: " + result.id;
  }
</script>

</body>
</html>
