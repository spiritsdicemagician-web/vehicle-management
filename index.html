<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CAR MANAGER</title>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #0a0e14; color: #e0e0e0; margin: 0; padding: 20px; }
  .card { background: #151b23; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #1a222e; }
  th, td { border: 1px solid #333; padding: 12px; text-align: left; }
  th { background: #252d38; color: #9fc9ff; }
  button { padding: 10px 20px; cursor: pointer; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-weight: 600; }
  .delete-btn { background: #ef4444; }
  input { padding: 10px; border-radius: 6px; border: 1px solid #333; background: #1a222e; color: white; margin: 5px; }
</style>
</head>
<body>

<div class="card">
  <h2>状態: <span id="statusMsg">準備完了</span></h2>
  <button id="loginBtn">1. Googleログイン</button>
  <button id="loadBtn">2. データ読み込み</button>
</div>

<!-- 車両一覧エリア -->
<div class="card">
  <h2>車両一覧</h2>
  <table id="carTable">
    <thead>
      <tr><th>ナンバー</th><th>車種</th><th>メーカー</th><th>使用者</th><th>点検日</th><th>操作</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <button onclick="saveVehicleData()">3. 上書き保存</button>
</div>

<!-- 車両登録エリア -->
<div class="card">
  <h2>車両登録</h2>
  <input type="text" id="carNumber" placeholder="ナンバー">
  <input type="text" id="model" placeholder="車種">
  <input type="text" id="maker" placeholder="メーカー">
  <input type="text" id="user" placeholder="使用者">
  <input type="date" id="inspection">
  <button id="addCar">登録</button>
</div>

<script>
  let appData = { cars: [] };
  let accessToken = null;
  const tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: '1074075293181-lg9bbbgk3h3shb1fdnjspt860i276957.apps.googleusercontent.com',
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: (res) => { accessToken = res.access_token; document.getElementById("statusMsg").innerText = "ログイン成功"; }
  });

  document.getElementById("loginBtn").onclick = () => tokenClient.requestAccessToken();

  document.getElementById("addCar").onclick = () => {
    appData.cars.push({
      id: Date.now(),
      number: document.getElementById("carNumber").value,
      model: document.getElementById("model").value,
      maker: document.getElementById("maker").value,
      user: document.getElementById("user").value,
      inspection: document.getElementById("inspection").value
    });
    renderCarTable();
  };

  function renderCarTable() {
    const tbody = document.querySelector("#carTable tbody");
    tbody.innerHTML = "";
    appData.cars.forEach(car => {
      tbody.innerHTML += `<tr><td>${car.number}</td><td>${car.model}</td><td>${car.maker}</td><td>${car.user}</td><td>${car.inspection}</td><td><button class="delete-btn" onclick="deleteCar(${car.id})">削除</button></td></tr>`;
    });
  }

  function deleteCar(id) { appData.cars = appData.cars.filter(c => c.id !== id); renderCarTable(); }

  document.getElementById("loadBtn").onclick = async () => {
    if (!accessToken) { alert("先にログインしてください"); return; }
    const res = await fetch("https://www.googleapis.com/drive/v3/files?q=name='vehicle_data.json' and trashed=false", { headers: { Authorization: "Bearer " + accessToken }});
    const list = await res.json();
    if (list.files?.length) {
      const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${list.files[0].id}?alt=media`, { headers: { Authorization: "Bearer " + accessToken }});
      appData = await fileRes.json();
      renderCarTable();
      document.getElementById("statusMsg").innerText = "読み込み完了";
    }
  };

  async function saveVehicleData() {
    if (!accessToken) { alert("先にログインしてください"); return; }
    const res = await fetch("https://www.googleapis.com/drive/v3/files?q=name='vehicle_data.json' and trashed=false", { headers: { Authorization: "Bearer " + accessToken }});
    const list = await res.json();
    const blob = new Blob([JSON.stringify(appData)], { type: "application/json" });
    if (list.files?.length) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${list.files[0].id}?uploadType=media`, { method: "PATCH", headers: { Authorization: "Bearer " + accessToken }, body: blob });
    } else {
      const form = new FormData();
      form.append("metadata", new Blob([JSON.stringify({ name: "vehicle_data.json", mimeType: "application/json" })], { type: "application/json" }));
      form.append("file", blob);
      await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", { method: "POST", headers: { Authorization: "Bearer " + accessToken }, body: form });
    }
    alert("保存しました");
  }
</script>
</body>
</html>
