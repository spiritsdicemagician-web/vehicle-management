<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>車両管理アプリ</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#020817,#06122d 40%,#090f22);
color:#eef4ff;
position:relative;
overflow-x:hidden;
}
body::before{
content:'';
position:fixed;
inset:0;
background:radial-gradient(circle at top right,rgba(80,120,255,.18),transparent 40%);
pointer-events:none;
}
.container{max-width:1400px;margin:auto;padding:24px;}
.header-wrap{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.logo{
font-size:56px;font-weight:900;font-style:italic;
letter-spacing:2px;color:#fff;
text-shadow:0 0 20px rgba(100,150,255,.8);
}
.hero-car {
  height: 220px;
  margin-bottom: 20px;
  border-radius: 20px;
  /* 画像（手前）とグラデーション（奥）をカンマ区切りで両方指定 */
  background: 
    url("car.png") right center / auto 220px no-repeat,
    linear-gradient(90deg, transparent, rgba(80,120,255,.08));
}
.current-time{
background:rgba(20,30,60,.6);
padding:10px 18px;
border-radius:12px;
border:1px solid rgba(100,150,255,.2);
}
.card,.modal-content{
background:rgba(10,18,40,.72);
border:1px solid rgba(90,130,255,.18);
backdrop-filter:blur(10px);
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.35);
padding:20px;
margin-bottom:20px;
}
.card h2{
color:#fff;
border-left:4px solid #4f8cff;
padding-left:12px;
}
.stats{display:flex;gap:20px;}
.stat-box{
flex:1;
min-height:110px;
background:linear-gradient(135deg,rgba(30,45,110,.8),rgba(45,15,100,.7));
border-radius:16px;
padding:20px;
}
.stat-content{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
height:40px;
}
.stat-icon{font-size:42px;}
.stat-number{font-size:32px;font-weight:800;margin:0;}
table{width:100%;border-collapse:collapse;}
th{
background:rgba(50,70,140,.5);
}
th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.08);
}
input,textarea{
width:100%;
box-sizing:border-box;
background:rgba(255,255,255,.05);
border:1px solid rgba(120,160,255,.15);
color:white;
padding:12px;
border-radius:10px;
}
button{
background:linear-gradient(135deg,#2d6dff,#5b8cff);
border:none;
padding:12px 18px;
border-radius:10px;
color:white;
font-weight:700;
cursor:pointer;
}
.flex-row{display:flex;gap:20px;}
.flex-row .card{flex:1;}
.detail-btn{background:#72809b;}
.edit-btn{background:#2288ff;}
.delete-btn{background:#d84d67;}
.modal-overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
}
.history-form{
background:rgba(255,255,255,.04);
padding:12px;
border-radius:10px;
}
</style>
</head>
<body>

<div class="container">

  <div class="header-wrap">
    <div class="logo">CAR MANAGER</div>
    <!-- 保存を押した時間を表示する領域 -->
    <div class="current-time">最終保存日時: <span id="clock">----/--/-- --:--:--</span></div>
  </div>
<div class="hero-car"></div>

  <!-- ダッシュボード -->
  <div class="card">
    <h2>ダッシュボード</h2>
    <div class="stats">
      <div class="stat-box">
        <h3>登録車両数</h3>
        <div class="stat-content">
          <!-- 文字の左側に2倍サイズの車アイコン -->
          <span class="stat-icon">🚗</span>
          <p id="statTotal" class="stat-number">0台</p>
        </div>
      </div>
      <div class="stat-box">
        <h3>今月の車検予定</h3>
        <div class="stat-content">
          <!-- 文字の左側に2倍サイズの書類アイコン -->
          <span class="stat-icon">📄</span>
          <p id="statUpcoming" class="stat-number">0台</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 車両一覧 -->
  <div class="card">
    <h2>車両一覧</h2>
    <table id="carTable">
      <thead>
        <tr>
          <th>ナンバー</th>
          <th>車種</th>
          <th>メーカー</th>
          <th>使用者</th>
          <th>車検日</th>
          <th>点検日</th>
          <th>備考</th>
          <th>詳細</th>
          <th>編集</th>
          <th>削除</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- 車両登録 + Googleドライブ連携（横並び） -->
  <div class="flex-row">

    <!-- 車両登録 -->
    <div class="card">
      <h2>車両登録</h2>
      <label>ナンバー：<br><input type="text" id="carNumber"></label><br>
      <label>車種：<br><input type="text" id="model"></label><br>
      <label>メーカー：<br><input type="text" id="maker"></label><br>
      <label>使用者：<br><input type="text" id="user"></label><br>
      <label>車検日：<br><input type="date" id="inspection2"></label><br>
      <label>点検日：<br><input type="date" id="inspection"></label><br>
      <label>備考：<br><input type="text" id="note"></label><br>
      <button id="addCar">登録する</button>
    </div>

    <!-- Googleドライブ連携 -->
    <div class="card">
      <h2>Googleドライブ連携</h2>
      <button id="loginBtn">Googleログイン</button>
      <p id="loginStatus" class="status"></p>

      <!-- 位置を逆に入れ替え（読み込みを上に、保存を下に） -->
      <button id="loadBtn">Googleドライブから読み込む</button>
      <p id="loadStatus" class="status"></p>

      <button onclick="saveVehicleData()">Googleドライブに保存</button>
      <p id="saveStatus" class="status"></p>
    </div>

  </div>

</div>

<!-- 詳細・過去の履歴用ポップアップ（モーダル） -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">車両詳細履歴</h3>
      <button class="close-modal" onclick="closeModal()">&times;</button>
    </div>
    
    <h4>新しい履歴を追加</h4>
    <div class="history-form">
      <label>点検日:<br><input type="date" id="histDate"></label><br>
      <label>各種検査内容:<br><textarea id="histContent" placeholder="例: 法定2年点検、オイル交換など"></textarea></label><br>
      <button onclick="addHistoryRecord()">履歴を保存</button>
    </div>

    <h4>過去の履歴一覧</h4>
    <table id="historyTable">
      <thead>
        <tr>
          <th style="width: 30%;">点検日</th>
          <th style="width: 70%;">各種検査内容</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  let appData = { cars: [] };
  let tokenClient;
  let accessToken = null;
  let currentDetailCarId = null; 
  let editingCarId = null; 

  window.onload = function () {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: '1074075293181-lg9bbbgk3h3shb1fdnjspt860i276957.apps.googleusercontent.com',
      scope: 'https://www.googleapis.com/auth/drive.file',
      callback: (response) => {
        accessToken = response.access_token;
        document.getElementById("loginStatus").textContent = "ログイン成功！";
      },
    });
    document.getElementById("loginBtn").onclick = () => tokenClient.requestAccessToken();
  };

  /* 保存完了時に日時を更新する関数 */
  function updateSaveTime() {
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    const hh = String(now.getHours()).padStart(2, '0');
    const min = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');
    document.getElementById("clock").textContent = `${yyyy}/${mm}/${dd} ${hh}:${min}:${ss}`;
  }

  /* 車両登録・更新ボタンのイベント */
  document.getElementById("addCar").addEventListener("click", () => {
    const number = document.getElementById("carNumber").value.trim();
    const model = document.getElementById("model").value.trim();
    if (!number || !model) { alert("ナンバーと車種は必須です"); return; }

    if (editingCarId !== null) {
      const car = appData.cars.find(c => c.id === editingCarId);
      if (car) {
        car.number = number;
        car.model = model;
        car.maker = document.getElementById("maker").value;
        car.user = document.getElementById("user").value;
        car.inspection2 = document.getElementById("inspection2").value;
        car.inspection = document.getElementById("inspection").value;
        car.note = document.getElementById("note").value;
      }
      editingCarId = null;
      document.getElementById("addCar").textContent = "登録する";
    } else {
      appData.cars.push({
        id: Date.now(),
        number,
        model,
        maker: document.getElementById("maker").value,
        user: document.getElementById("user").value,
        inspection2: document.getElementById("inspection2").value, 
        inspection: document.getElementById("inspection").value,   
        note: document.getElementById("note").value,
        history: [] 
      });
    }

    renderCarTable();
    updateStats();
    clearForm();
  });

  /* フォームのクリア */
  function clearForm() {
    document.getElementById("carNumber").value = "";
    document.getElementById("model").value = "";
    document.getElementById("maker").value = "";
    document.getElementById("user").value = "";
    document.getElementById("inspection2").value = "";
    document.getElementById("inspection").value = "";
    document.getElementById("note").value = "";
  }

  /* 編集機能 */
  function editCar(id) {
    const car = appData.cars.find(c => c.id === id);
    if (!car) return;

    document.getElementById("carNumber").value = car.number;
    document.getElementById("model").value = car.model;
    document.getElementById("maker").value = car.maker;
    document.getElementById("user").value = car.user;
    document.getElementById("inspection2").value = car.inspection2 ?? "";
    document.getElementById("inspection").value = car.inspection;
    document.getElementById("note").value = car.note;

    editingCarId = id;
    document.getElementById("addCar").textContent = "更新する";
  }

  /* 削除機能 */
  function deleteCar(id) {
    if(editingCarId === id) {
      editingCarId = null;
      document.getElementById("addCar").textContent = "登録する";
      clearForm();
    }
    appData.cars = appData.cars.filter(car => car.id !== id);
    renderCarTable();
    updateStats();
  }

  /* 詳細ポップアップ（モーダル）を開く */
  function openDetail(id) {
    currentDetailCarId = id;
    const car = appData.cars.find(c => c.id === id);
    if (!car) return;

    if (!car.history) car.history = [];

    document.getElementById("modalTitle").textContent = `【${car.number}】${car.model} 点検詳細履歴`;
    document.getElementById("histDate").value = "";
    document.getElementById("histContent").value = "";
    
    renderHistoryTable(car.history);
    document.getElementById("detailModal").style.display = "flex"; 
  }

  /* モーダルを閉じる */
  function closeModal() {
    document.getElementById("detailModal").style.display = "none";
    currentDetailCarId = null;
  }

  /* モーダル内の履歴テーブル描画 */
  function renderHistoryTable(history) {
    const tbody = document.querySelector("#historyTable tbody");
    tbody.innerHTML = "";
    if (history.length === 0) {
      tbody.innerHTML = `<tr><td colspan="2" style="text-align:center;color:#8b949e;">履歴がありません</td></tr>`;
      return;
    }
    const sortedHistory = [...history].sort((a, b) => new Date(b.date) - new Date(a.date));
    sortedHistory.forEach(item => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${item.date}</td>
        <td style="white-space: pre-wrap;">${item.content}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  /* 履歴レコードの追加 */
  function addHistoryRecord() {
    const date = document.getElementById("histDate").value;
    const content = document.getElementById("histContent").value.trim();
    if (!date || !content) { alert("点検日と検査内容は必須です"); return; }

    const car = appData.cars.find(c => c.id === currentDetailCarId);
    if (!car) return;

    if (!car.history) car.history = [];
    car.history.push({ date, content });

    renderHistoryTable(car.history);
    document.getElementById("histDate").value = "";
    document.getElementById("histContent").value = "";
  }

  /* 車両一覧描画 */
  function renderCarTable() {
    const tbody = document.querySelector("#carTable tbody");
    tbody.innerHTML = "";
    appData.cars.forEach(car => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${car.number}</td>
        <td>${car.model}</td>
        <td>${car.maker}</td>
        <td>${car.user}</td>
        <td>${car.inspection2 ?? ""}</td>
        <td>${car.inspection}</td>
        <td>${car.note ?? ""}</td>
        <td><button class="detail-btn" onclick="openDetail(${car.id})">詳細</button></td>
        <td><button class="edit-btn" onclick="editCar(${car.id})">編集</button></td>
        <td><button class="delete-btn" onclick="deleteCar(${car.id})">削除</button></td>
      `;
      tbody.appendChild(tr);
    });
  }

  /* ダッシュボード統計 */
  function updateStats() {
    document.getElementById("statTotal").textContent = appData.cars.length + "台";

    const today = new Date();
    const currentYear = today.getFullYear();
    const currentMonth = today.getMonth(); 
    
    let upcoming = 0;

    appData.cars.forEach(car => {
      if (!car.inspection2) return; 
      
      const inspection2Date = new Date(car.inspection2);
      
      const targetYear = inspection2Date.getFullYear() + 2;
      const targetMonth = inspection2Date.getMonth();

      if (currentYear === targetYear && currentMonth === targetMonth) {
        upcoming++;
      }
    });

    document.getElementById("statUpcoming").textContent = upcoming + "台";
  }

  /* Drive保存 */
  async function saveVehicleData() {
    if (!accessToken) { alert("先にログインしてください"); return; }

    const file = new Blob([JSON.stringify(appData)], { type: "application/json" });
    const metadata = { name: "vehicle_data.json", mimeType: "application/json" };
    const form = new FormData();
    form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
    form.append("file", file);

    const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
      method: "POST",
      headers: { Authorization: "Bearer " + accessToken },
      body: form
    });
    const result = await res.json();
    document.getElementById("saveStatus").textContent = "保存完了 (ID: " + result.id + ")";
    
    // 保存が成功したタイミングで右上の時間を更新
    updateSaveTime();
  }

  /* Drive読み込み */
  document.getElementById("loadBtn").onclick = async () => {
    if (!accessToken) { alert("先にログインしてください"); return; }

    document.getElementById("loadStatus").textContent = "読み込み中…";

    const query = encodeURIComponent("name = 'vehicle_data.json' and trashed = false");
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${query}`, {
      headers: { Authorization: "Bearer " + accessToken }
    });
    const list = await res.json();

    if (!list.files || list.files.length === 0) {
      document.getElementById("loadStatus").textContent = "vehicle_data.json が見つかりません";
      return;
    }

    const fileId = list.files[0].id;

    const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: "Bearer " + accessToken }
    });

    const data = await fileRes.json();
    appData = data;

    appData.cars.forEach(car => {
      if (!car.history) car.history = [];
    });

    renderCarTable();
    updateStats();

    document.getElementById("loadStatus").textContent = "読み込み完了！";
  };
</script>

</body>
</html>
